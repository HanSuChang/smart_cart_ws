# ================================================================
# safety_params.yaml
# [C++ 담당] safety_monitor 파라미터
# LDS-02 LiDAR 기반 장애물 감지
# ================================================================

safety_monitor:
  ros__parameters:
    # 이 거리 이내 장애물 → 긴급정지
    stop_distance_m: 0.35

    # 이 거리 이상 멀어져야 재출발 (히스테리시스 — 떨림 방지)
    resume_distance_m: 0.50

    # 전방 감지 각도 범위 (±30° = 전방 60° 부채꼴)
    front_angle_deg: 30.0
