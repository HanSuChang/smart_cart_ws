# ================================================================
# webcam_params.yaml
# USB 웹캠 2대 설정
# 웹캠1 (/dev/video0) → 사람 추종용
# 웹캠2 (/dev/video2) → 물체 인식용
# ros2 topic list 후 카메라 모델 확인
# ================================================================

# 웹캠 1번 — 사람 추종
webcam:
  ros__parameters:
    video_device: "/dev/video0"
    image_size: [320, 240]
    pixel_format: "mjpeg"
    camera_frame_id: "webcam_link"

# 웹캠 2번 — 물체 인식
webcam2:
  ros__parameters:
    video_device: "/dev/video2"
    image_size: [320, 240]
    pixel_format: "mjpeg"
    camera_frame_id: "webcam2_link"