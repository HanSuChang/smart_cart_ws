; ================================================================
; platformio.ini
; OpenCR 보드에서 MG996R 서보모터 3개 제어
;
; [하드웨어]
;   - OpenCR 1.0 (TurtleBot3 Waffle Pi 내장)
;   - MG996R x2 (Pan/Tilt 웹캠 회전) + MG996R x1 (바구니 뚜껑)
;   - 메탈 브라켓 1개 (Pan/Tilt 고정용)
;
; [통신]
;   ROS2(RPi4) → USB Serial → OpenCR
;   /servo_control 토픽 → serial bridge → 이 펌웨어가 수신 → PWM 출력
;
; ※ OpenCR은 Arduino IDE 호환 — PlatformIO에서도 빌드 가능
;   하지만 OpenCR 공식 보드 정의가 PlatformIO에 없을 수 있음
;   그 경우 Arduino IDE에서 직접 빌드하고 이 폴더는 소스 관리용으로 사용
; ================================================================

[env:opencr]
platform = ststm32
board = genericSTM32F746ZG
framework = arduino

; OpenCR 전용 라이브러리 (필요시 추가)
lib_deps =

; 시리얼 통신 속도 (ROS2 serial bridge와 맞추기)
monitor_speed = 115200

; 소스/헤더 경로
src_dir = src
include_dir = include
